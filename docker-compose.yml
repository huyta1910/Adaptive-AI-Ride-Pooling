services:
  db:
    image: postgres:16-alpine
    container_name: adaptive-ride-pooling-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-adaptive_ride_pooling}
      POSTGRES_USER: ${POSTGRES_USER:-adaptive_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adaptive_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adaptive_user} -d ${POSTGRES_DB:-adaptive_ride_pooling}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: adaptive-ride-pooling-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: adaptive-ride-pooling-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
